<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorBridge - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans flex flex-col md:flex-row h-screen overflow-hidden">
    <div class="w-full md:w-64 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col justify-between p-6">
        <div>
            <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">VendorBridge</h2>
            <div class="mt-2 bg-blue-500/10 text-blue-400 text-xs px-2.5 py-1 rounded-full inline-block font-medium">Role: {{ role }}</div>
            <nav class="mt-8 space-y-2">
                <a href="{% url 'dashboard' %}" class="flex items-center px-4 py-3 bg-blue-600 rounded-xl text-white font-medium">🏠 Dashboard</a>
                <a href="{% url 'vendor_management' %}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl">🤝 Vendor Management</a>
                <a href="{% url 'rfq_creation' %}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl">📄 RFQ Creation</a>
                <a href="{% url 'quotation_submission' %}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl">💰 Submit Quotations</a>
                <a href="{% url 'quotation_comparison' %}" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl">📊 Compare & Approve</a>
            </nav>
        </div>
        <div class="pt-4 border-t border-slate-800 text-center">
            <p class="text-xs text-slate-500">Team</p>
            <p class="text-sm font-semibold text-slate-300">{{ team_name }}</p>
            <a href="{% url 'logout' %}" class="mt-3 block text-xs bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white py-2 rounded-lg">Logout 👋</a>
        </div>
    </div>
    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-slate-900/50 backdrop-blur border-b border-slate-800 px-8 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">Procurement Command Center</h1>
        </header>
        <main class="p-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <p class="text-slate-400 text-sm font-medium">Total Vendors</p>
                    <p class="text-3xl font-bold mt-2 text-indigo-400">{{ total_vendors }}</p>
                </div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <p class="text-slate-400 text-sm font-medium">Total RFQs Raised</p>
                    <p class="text-3xl font-bold mt-2 text-blue-400">{{ total_rfqs }}</p>
                </div>
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <p class="text-slate-400 text-sm font-medium">Active / Open RFQs</p>
                    <p class="text-3xl font-bold mt-2 text-emerald-400">{{ open_rfqs }}</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
