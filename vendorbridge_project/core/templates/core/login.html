<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorBridge - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex h-screen items-center justify-center font-sans">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 tracking-tight">VendorBridge</h1>
            <p class="text-slate-400 text-sm mt-2">Procurement & Vendor Management ERP</p>
        </div>
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-lg text-sm mb-5 text-center">{{ error }}</div>
        {% endif %}
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Username / Email</label>
                <input type="text" name="username" required class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500" placeholder="Enter username">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold rounded-xl shadow-lg transition-all">Sign In</button>
        </form>
        <div class="mt-8 text-center border-t border-slate-700/50 pt-5">
            <p class="text-xs text-slate-500">Engineered by <span class="text-blue-400 font-semibold">Code-Warriors-Ksv</span></p>
        </div>
    </div>
</body>
</html>
