<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 p-8 max-w-3xl mx-auto border border-slate-300 my-10 rounded-xl shadow-lg">
    <div class="flex justify-between border-b pb-5">
        <div>
            <h1 class="text-3xl font-black">VendorBridge ERP</h1>
            <p class="text-xs text-indigo-600 font-bold">Team: {{ team_name }}</p>
        </div>
        <div class="text-right text-sm">
            <p><strong>PO No:</strong> {{ po_number }}</p>
            <p><strong>Invoice No:</strong> {{ invoice_number }}</p>
        </div>
    </div>
    <div class="my-6">
        <h3 class="text-sm font-bold text-slate-400 uppercase">Vendor (Supplier)</h3>
        <p class="text-lg font-bold">{{ quote.vendor.company_name }}</p>
        <p class="text-sm">GSTIN: {{ quote.vendor.gst_number }}</p>
    </div>
    <div class="border-t pt-4 text-right">
        <p class="text-sm">Subtotal: ₹{{ subtotal }}</p>
        <p class="text-sm">GST (18%): ₹{{ tax_amount }}</p>
        <p class="text-xl font-black text-indigo-600">Grand Total: ₹{{ final_amount }}</p>
    </div>
    <button onclick="window.print()" class="mt-6 bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl w-full">🖨️ Print PDF Invoice</button>
</body>
</html>
