<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vendor Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <div class="flex justify-between items-center border-b border-slate-800 pb-5">
            <h1 class="text-3xl font-bold text-blue-400">🤝 Vendor Management</h1>
            <a href="{% url 'dashboard' %}" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm">🔙 Dashboard</a>
        </div>
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h2 class="text-xl font-semibold mb-4 text-slate-300">Register New Vendor</h2>
            <form method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                {% csrf_token %}
                <input type="text" name="company_name" placeholder="Company Name" required class="bg-slate-950 border border-slate-700 p-3 rounded-xl text-white">
                <input type="text" name="gst_number" placeholder="GST Number" required class="bg-slate-950 border border-slate-700 p-3 rounded-xl text-white">
                <input type="text" name="category" placeholder="Category" required class="bg-slate-950 border border-slate-700 p-3 rounded-xl text-white">
                <input type="text" name="username" placeholder="Vendor Username" required class="bg-slate-950 border border-slate-700 p-3 rounded-xl text-white">
                <button type="submit" class="md:col-span-4 bg-blue-600 hover:bg-blue-700 font-bold p-3 rounded-xl">+ Register Vendor</button>
            </form>
        </div>
        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-slate-400 text-sm">
                    <tr>
                        <th class="p-4">Company Name</th>
                        <th class="p-4">GST Number</th>
                        <th class="p-4">Category</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                    {% for v in vendors %}
                    <tr class="hover:bg-slate-800/50">
                        <td class="p-4 font-medium">{{ v.company_name }}</td>
                        <td class="p-4 text-slate-300">{{ v.gst_number }}</td>
                        <td class="p-4 text-slate-400">{{ v.category }}</td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="3" class="p-8 text-center text-slate-500">No vendors registered yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
